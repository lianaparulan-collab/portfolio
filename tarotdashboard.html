<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style_1.css">
    <title>Existential Arcana</title>
</head>
<body>
    <header>
        <h1>Existential Arcana</h1>
    </header>

    <section class="card-draw">
        <h2>Draw Your Card</h2>
        <p class="card-draw-paragraph">Focus your mind and let the universe guide you.</p>

        <div class="card-display">
            <div class="card-face">
                <img src="cards/m00.jpg" alt="Tarot Card">
            </div>
        </div>

        <div class="card-info">
            <h3 class="card-name"></h3>
            <p class="card-meaning"></p>
        </div>

        <div class="card-controls">

            <button class="btn btn-draw">Draw</button>

            <label class="reversed-label">
                <input type="checkbox" class="reversed-checkbox">
                Reversed
            </label>

            <button class="btn btn-reset">Reset</button>

        </div>

    </section>

</body>
</html>
